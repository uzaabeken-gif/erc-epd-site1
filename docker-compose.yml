services:
  backend:
    build: ./backend
    container_name: erc-backend
    env_file: .env
    volumes:
      - ./storage:/workspace/storage
      - ./backend/prisma:/app/prisma
    environment:
      DATABASE_URL: ${DATABASE_URL}
      UPLOAD_DIR: /workspace/storage/uploads
      RECEIPT_DIR: /workspace/storage/receipts
      AD_MEDIA_DIR: /workspace/storage/ad-media
    ports:
      - "127.0.0.1:4000:4000"
    working_dir: /app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: erc-frontend
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
